# Two-Line High-Contrast Bash Formatting
# Line 1: Shows your exact, full directory path starting from the left
# Line 2: Drops down to give you a clean, dedicated input field
format = """$directory
$git_branch$git_status$character"""

# Don't add a blank line between terminal commands
add_newline = false

[character]
success_symbol = "[❯](bold white) "
error_symbol = "[❌](bold white) "

[directory]
style = "bold white"
# 1. Disables path shortening entirely so you see the literal full path
truncation_length = 0
# 2. Replaces the "~" shortcut with your exact home directory path matching your user account
home_symbol = "/home/kaz"
read_only = " [LOCKED]"

[git_branch]
symbol = "󰘬 "
style = "bold white"
format = "on [$symbol$branch]($style) "

[git_status]
style = "bold white"
format = "([\\[$all_status$ahead_behind\\]]($style) )"
